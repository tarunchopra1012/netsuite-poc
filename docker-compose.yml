name: netsuite-poc

services:
  postgres:
    image: postgres:15.5
    container_name: postgres
    environment:
      POSTGRES_USER: poc
      POSTGRES_PASSWORD: poc
      POSTGRES_DB: netsuite_poc
    ports:
      - "5433:5432"
    volumes:
      # Bind-mount so synced data persists in the repo at dev/pgsql/data
      # (created by `npm run dev:prepare`). Survives `docker compose down`.
      - ./dev/pgsql/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc -d netsuite_poc"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Browser-based Redis GUI. Open http://localhost:8081 to inspect keys
  # (e.g. the cached netsuite:access_token). Talks to redis over the compose network.
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "8080:8080"
    # Load NetSuite creds (+ NETSUITE_MODE) from .env if present. Missing file is fine:
    # with no creds, auto mode falls back to mock so the demo always works.
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "8080"
      # Reach redis/postgres by service name on the compose network.
      # (environment overrides env_file, so these win over the .env localhost URLs.)
      REDIS_URL: "redis://redis:6379"
      DATABASE_URL: "postgres://poc:poc@postgres:5432/netsuite_poc"
      DATABASE_SCHEMA: "public"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
